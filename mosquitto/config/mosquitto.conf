persistence true
persistence_location /mosquitto/data/
log_dest stdout

# ---------------------------------------------------------------------------
# Connection limits
# ---------------------------------------------------------------------------
# Cap simultaneous connections (a handful of IoT devices + backend client)
max_connections 100

# ---------------------------------------------------------------------------
# Per-client message limits
# ---------------------------------------------------------------------------
# Max unacknowledged QoS 1/2 messages in-flight per client
max_inflight_messages 20

# Max messages queued for a client that is slow or offline
max_queued_messages 500

# ---------------------------------------------------------------------------
# Payload size
# ---------------------------------------------------------------------------
# LoRaWAN max payload is ~242 bytes; 8 KB is generous headroom
message_size_limit 8192

# ---------------------------------------------------------------------------
# Default listener (plain MQTT)
# ---------------------------------------------------------------------------
listener 1883
allow_anonymous true

# ---------------------------------------------------------------------------
# SSL Listener (active once certs are generated)
# ---------------------------------------------------------------------------
listener 8883
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
cafile /mosquitto/certs/ca.crt
require_certificate true
