persistence true
persistence_location /mosquitto/data/
log_dest stdout

# Global per-client message limits
max_inflight_messages 20
max_queued_messages 500

# ---------------------------------------------------------------------------
# Default listener — plain MQTT
# ---------------------------------------------------------------------------
listener 1883
allow_anonymous true
# max_connections is a per-listener option in Mosquitto 2.x (must come after listener)
max_connections 100

# ---------------------------------------------------------------------------
# SSL Listener (active once certs are generated)
# ---------------------------------------------------------------------------
listener 8883
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
cafile /mosquitto/certs/ca.crt
require_certificate true
max_connections 100
