# =============================================================================
# ChirpStack Network Server — Main Configuration
# =============================================================================
# Documentation: https://www.chirpstack.io/docs/chirpstack/configuration.html
#
# This file is mounted into the chirpstack container at /etc/chirpstack/.
# The POSTGRESQL__DSN environment variable (set in docker-compose.yml) overrides
# the dsn value below so it picks up POSTGRES_USER/POSTGRES_PASSWORD from .env.
# =============================================================================

[logging]
  level="info"

[postgresql]
  dsn="postgres://postgres:postgres@postgres/chirpstack?sslmode=disable"
  max_open_connections=10
  min_idle_connections=0

[redis]
  # "redis" is the Docker Compose service name for the chirpstack-redis container.
  servers=[
    "redis://redis:6379/",
  ]
  tls_enabled=false
  cluster=false

[network]
  net_id="000000"
  # IDs must match the 'id' field in the region .toml files below.
  # Include eu868, us915_0, or both depending on your hardware.
  enabled_regions=[
    "eu868",
    "us915_0",
  ]

[api]
  bind="0.0.0.0:8080"
  # Long random string — used to sign JWT API tokens.
  # CHANGE THIS before running in production:
  #   openssl rand -base64 32
  secret="CHANGE_ME_USE_openssl_rand_-base64_32_TO_GENERATE_A_PROPER_SECRET"

# ---------------------------------------------------------------------------
# Integration — publishes decoded uplinks to the MQTT broker.
# Topic templates match the regexes in backend/src/adapters/chirpstack.js.
# ---------------------------------------------------------------------------
[integration]
  enabled=["mqtt"]

  [integration.mqtt]
    # "mqtt-broker" is the Docker Compose service name for the Mosquitto container.
    server="tcp://mqtt-broker:1883/"
    # Use JSON encoding (not protobuf) so our adapter can parse with JSON.parse()
    json=true
