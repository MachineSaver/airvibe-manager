# =============================================================================
# ChirpStack Region Configuration — EU868
# =============================================================================
# Standard European 868 MHz LoRaWAN band (ETSI).
# Reference: LoRaWAN Regional Parameters v1.0.3 / 1.1
# =============================================================================

[[regions]]
  id          = "eu868"
  description = "EU868"

  [regions.network]
    installation_margin     = 10
    rx_window               = 0
    rx2_dr                  = 0
    rx2_frequency           = 869525000
    rx1_delay               = 1
    rx1_dr_offset           = 0
    gateway_prefer_min_margin = 10
    downlink_tx_power       = -1   # use band default
    adr_disabled            = false
    min_dr                  = 0
    max_dr                  = 5

    [regions.network.band]
      name             = "EU868"
      enforce_dwelltimes = false
      uplink_max_eirp  = 16.0

    [regions.network.extra_channels]
      # No extra channels beyond the three mandatory EU868 channels
      # and the four additional Semtech recommended channels below.

  # -------------------------------------------------------------------------
  # Gateway default channels (Semtech 8-channel reference design)
  # -------------------------------------------------------------------------

  [[regions.gateways.channels]]
    frequency         = 868100000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10, 11, 12]

  [[regions.gateways.channels]]
    frequency         = 868300000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10, 11, 12]

  [[regions.gateways.channels]]
    frequency         = 868500000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10, 11, 12]

  [[regions.gateways.channels]]
    frequency         = 867100000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10, 11, 12]

  [[regions.gateways.channels]]
    frequency         = 867300000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10, 11, 12]

  [[regions.gateways.channels]]
    frequency         = 867500000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10, 11, 12]

  [[regions.gateways.channels]]
    frequency         = 867700000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10, 11, 12]

  [[regions.gateways.channels]]
    frequency         = 867900000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10, 11, 12]

  # 250 kHz FSK channel
  [[regions.gateways.channels]]
    frequency         = 868300000
    bandwidth         = 250000
    spreading_factors = [7]

  # FSK channel
  [[regions.gateways.channels]]
    frequency         = 868800000
    bandwidth         = 125000
    spreading_factors = [7]
