# =============================================================================
# ChirpStack Region Configuration — US915
# =============================================================================
# North American 915 MHz LoRaWAN band (FCC).
# Sub-band 2 (channels 8–15 + 65) is the most common deployment; adjust
# to match the sub-band configured on your gateways and devices.
# Reference: LoRaWAN Regional Parameters v1.0.3 / 1.1
# =============================================================================

[[regions]]
  id          = "us915"
  description = "US915 (sub-band 2)"

  [regions.network]
    installation_margin     = 10
    rx_window               = 1   # Use RX1 first (500 kHz downlink channel)
    rx2_dr                  = 8   # DR8 = SF12 / 500 kHz
    rx2_frequency           = 923300000
    rx1_delay               = 1
    rx1_dr_offset           = 0
    gateway_prefer_min_margin = 10
    downlink_tx_power       = 20  # max 26 dBm EIRP per FCC
    adr_disabled            = false
    min_dr                  = 0
    max_dr                  = 4

    [regions.network.band]
      name             = "US915"
      enforce_dwelltimes = false
      uplink_max_eirp  = 30.0

  # -------------------------------------------------------------------------
  # Sub-band 2 uplink channels (channels 8–15, 64.0–64.9 MHz offsets)
  # -------------------------------------------------------------------------

  [[regions.gateways.channels]]
    frequency         = 903900000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10]

  [[regions.gateways.channels]]
    frequency         = 904100000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10]

  [[regions.gateways.channels]]
    frequency         = 904300000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10]

  [[regions.gateways.channels]]
    frequency         = 904500000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10]

  [[regions.gateways.channels]]
    frequency         = 904700000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10]

  [[regions.gateways.channels]]
    frequency         = 904900000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10]

  [[regions.gateways.channels]]
    frequency         = 905100000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10]

  [[regions.gateways.channels]]
    frequency         = 905300000
    bandwidth         = 125000
    spreading_factors = [7, 8, 9, 10]

  # 500 kHz uplink channel (channel 65 for sub-band 2)
  [[regions.gateways.channels]]
    frequency         = 904600000
    bandwidth         = 500000
    spreading_factors = [8]
