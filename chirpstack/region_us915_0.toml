# =============================================================================
# ChirpStack Region Configuration — US915 sub-band 0 (channels 0-7 + 64)
# =============================================================================
# North American 915 MHz LoRaWAN band (FCC).
# This is sub-band 0. To use a different sub-band, replace this file with
# the appropriate region_us915_N.toml and update enabled_regions in chirpstack.toml.
# Reference: LoRaWAN Regional Parameters v1.0.3 / 1.1
# =============================================================================

[[regions]]
  id="us915_0"
  description="US915 (channels 0-7 + 64)"
  common_name="US915"

  [regions.gateway]
    force_gws_private=false

    [regions.gateway.backend]
      enabled="mqtt"

      [regions.gateway.backend.mqtt]
        # Must match chirpstack-gateway-bridge event_topic_template prefix
        topic_prefix="us915_0"
        server="tcp://mqtt-broker:1883"
        username=""
        password=""
        qos=0
        clean_session=false
        client_id=""
        keep_alive_interval="30s"
        ca_cert=""
        tls_cert=""
        tls_key=""

    # Sub-band 0 uplink channels (0-7, 902.3-903.7 MHz)
    [[regions.gateway.channels]]
      frequency=902300000
      bandwidth=125000
      modulation="LORA"
      spreading_factors=[7, 8, 9, 10]

    [[regions.gateway.channels]]
      frequency=902500000
      bandwidth=125000
      modulation="LORA"
      spreading_factors=[7, 8, 9, 10]

    [[regions.gateway.channels]]
      frequency=902700000
      bandwidth=125000
      modulation="LORA"
      spreading_factors=[7, 8, 9, 10]

    [[regions.gateway.channels]]
      frequency=902900000
      bandwidth=125000
      modulation="LORA"
      spreading_factors=[7, 8, 9, 10]

    [[regions.gateway.channels]]
      frequency=903100000
      bandwidth=125000
      modulation="LORA"
      spreading_factors=[7, 8, 9, 10]

    [[regions.gateway.channels]]
      frequency=903300000
      bandwidth=125000
      modulation="LORA"
      spreading_factors=[7, 8, 9, 10]

    [[regions.gateway.channels]]
      frequency=903500000
      bandwidth=125000
      modulation="LORA"
      spreading_factors=[7, 8, 9, 10]

    [[regions.gateway.channels]]
      frequency=903700000
      bandwidth=125000
      modulation="LORA"
      spreading_factors=[7, 8, 9, 10]

    # 500 kHz uplink channel (channel 64 for sub-band 0)
    [[regions.gateway.channels]]
      frequency=903000000
      bandwidth=500000
      modulation="LORA"
      spreading_factors=[8]

  [regions.network]
    installation_margin=10
    rx_window=0
    rx1_delay=1
    rx1_dr_offset=0
    rx2_dr=8
    rx2_frequency=923300000
    rx2_prefer_on_rx1_dr_lt=0
    rx2_prefer_on_link_budget=false
    downlink_tx_power=-1
    adr_disabled=false
    min_dr=0
    max_dr=3
    enabled_uplink_channels=[0, 1, 2, 3, 4, 5, 6, 7, 64]

    [regions.network.rejoin_request]
      enabled=false
      max_count_n=0
      max_time_n=0

    [regions.network.class_b]
      ping_slot_dr=8
      ping_slot_frequency=0
