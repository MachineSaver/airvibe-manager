services:

  # ---------------------------------------------------------------------------
  # LoRaWAN Infrastructure  (profile: full)
  # ---------------------------------------------------------------------------
  # These services are only started when COMPOSE_PROFILES=full.
  # In app-only mode (COMPOSE_PROFILES=) they are omitted; point the env vars
  # MQTT_BROKER_URL and CHIRPSTACK_API_URL at the existing plant ChirpStack box.

  # Accepts UDP Packet Forwarder connections from gateways on port 1700/UDP
  # and relays them to the MQTT broker. Point your gateway's packet forwarder
  # "server address" at this host's LAN IP address.
  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    container_name: chirpstack-gateway-bridge
    profiles: [full]
    ports:
      - "1700:1700/udp"
    volumes:
      - ./chirpstack-gateway-bridge/chirpstack-gateway-bridge.toml:/etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge.toml
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  # One-shot sidecar: creates the ChirpStack database and pg_trgm extension
  # if they don't already exist, then exits. Runs on every "docker compose up"
  # so mode-switching (ThingPark → ChirpStack) works without volume surgery.
  chirpstack-db-init:
    image: postgres:16-alpine
    container_name: chirpstack-db-init
    profiles: [full]
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD:-postgres}
    command:
      - sh
      - -c
      - |
        until pg_isready -h postgres -U ${POSTGRES_USER:-postgres}; do
          echo 'chirpstack-db-init: waiting for postgres...'; sleep 2
        done
        psql -h postgres -U ${POSTGRES_USER:-postgres} -tc \
          "SELECT 1 FROM pg_database WHERE datname='chirpstack'" | grep -q 1 \
          || psql -h postgres -U ${POSTGRES_USER:-postgres} -c 'CREATE DATABASE chirpstack;'
        psql -h postgres -U ${POSTGRES_USER:-postgres} -d chirpstack \
          -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm;'
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ChirpStack Network Server + Application Server (unified v4)
  # Web UI available at http://<host>:8080  (admin / admin on first run)
  chirpstack:
    image: chirpstack/chirpstack:4
    container_name: chirpstack
    profiles: [full]
    command: -c /etc/chirpstack
    volumes:
      - ./chirpstack:/etc/chirpstack
    environment:
      # Override the DSN so it picks up POSTGRES_USER/PASSWORD from .env
      - POSTGRESQL__DSN=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres/chirpstack?sslmode=disable
    ports:
      - "8080:8080"   # ChirpStack web UI + REST API
    depends_on:
      postgres:
        condition: service_healthy
      chirpstack-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      mqtt-broker:
        condition: service_started
    restart: unless-stopped

  # Redis — required by ChirpStack for device session state
  redis:
    image: redis:7-alpine
    container_name: chirpstack-redis
    profiles: [full]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MQTT Broker  (profile: full)
  # ---------------------------------------------------------------------------

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    # No profile — starts in both ChirpStack (full) and ThingPark (app-only) modes.
    # ThingPark connects to this broker on port 8883 (mTLS); the backend connects
    # internally on port 1883. ChirpStack also publishes to this broker.
    ports:
      - "127.0.0.1:1883:1883"   # MQTT plain — loopback-only (containers use Docker bridge; host-local dev tools use localhost:1883)
      - "8883:8883"             # MQTT over TLS — publicly exposed for ThingPark inbound connections
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./certs:/mosquitto/certs
      - ./mosquitto/watcher.sh:/mosquitto/watcher.sh
    entrypoint: [ "/mosquitto/watcher.sh" ]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Database  (always starts)
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: mqtt-manager-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-airvibe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # AirVibe Waveform Manager (backend + frontend)  (always starts)
  # ---------------------------------------------------------------------------

  backend:
    build: ./backend
    container_name: mqtt-manager-backend
    ports:
      - "127.0.0.1:4000:4000"   # Loopback-only: accessible on the host for local dev but not reachable from the internet (Docker bypasses UFW for 0.0.0.0 bindings)
    environment:
      - PORT=4000
      # In full profile this resolves to the bundled Mosquitto container.
      # In app-only mode override this in .env to point at the plant ChirpStack broker.
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://mqtt-broker:1883}
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASS=${MQTT_PASS:-}
      - DOMAIN=${DOMAIN:-localhost}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-airvibe}
      - POSTGRES_PORT=5432
      # ChirpStack integration (generate API key in ChirpStack UI after first run)
      # In app-only mode override this in .env to point at the plant ChirpStack box.
      - CHIRPSTACK_API_URL=${CHIRPSTACK_API_URL:-http://chirpstack:8080}
      - CHIRPSTACK_API_KEY=${CHIRPSTACK_API_KEY:-}
      - CHIRPSTACK_APPLICATION_ID=${CHIRPSTACK_APPLICATION_ID:-1}
      - NETWORK_SERVER=${NETWORK_SERVER:-chirpstack}
    volumes:
      - ./certs:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://localhost}
        - NEXT_PUBLIC_BUILD_HASH=${NEXT_PUBLIC_BUILD_HASH:-unknown}
        - NEXT_PUBLIC_BUILD_DATE=${NEXT_PUBLIC_BUILD_DATE:-unknown}
    container_name: mqtt-manager-frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://localhost}
    depends_on:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reverse Proxy  (always starts)
  # ---------------------------------------------------------------------------

  caddy:
    image: caddy:alpine
    container_name: mqtt-manager-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - NETWORK_SERVER=${NETWORK_SERVER:-chirpstack}
    volumes:
      - ./caddy/entrypoint.sh:/usr/local/bin/caddy-start.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    entrypoint: ["/bin/sh", "/usr/local/bin/caddy-start.sh"]
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
