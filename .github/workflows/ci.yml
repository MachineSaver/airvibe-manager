name: CI

on:
  push:
    branches: [ main, ui-redesign ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Backend tests
      run: cd backend && npm ci && npm test

    - name: Frontend lint & build
      run: cd frontend && npm ci && npm run lint && npm run build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compute build metadata
      run: |
        echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
        echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
        # Use 'latest' for main, sanitized branch name for everything else
        BRANCH="${GITHUB_REF_NAME}"
        if [ "$BRANCH" = "main" ]; then
          echo "IMAGE_TAG=latest" >> $GITHUB_ENV
        else
          echo "IMAGE_TAG=${BRANCH//\//-}" >> $GITHUB_ENV
        fi

    - name: Build and push backend
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: ${{ github.event_name == 'push' }}
        tags: ghcr.io/machinesaver/airvibe-manager-backend:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: ${{ github.event_name == 'push' }}
        tags: ghcr.io/machinesaver/airvibe-manager-frontend:${{ env.IMAGE_TAG }}
        build-args: |
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://localhost' }}
          NEXT_PUBLIC_BUILD_HASH=${{ env.SHORT_SHA }}
          NEXT_PUBLIC_BUILD_DATE=${{ env.BUILD_DATE }}
          NEXT_PUBLIC_BUILD_BRANCH=${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
